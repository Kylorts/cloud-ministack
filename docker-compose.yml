services:

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_DATABASE: iniawan
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  ministack:
    image: ministackorg/ministack
    ports:
      - "4566:4566"
    environment:
      PERSIST_STATE: "1"
    volumes:
      - ministack_data:/var/lib/ministack
      - ministack_tmp:/tmp/ministack
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: iniawan
      JWT_SECRET_KEY: changeme-super-secret-key-for-iniawan-2026
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      CORS_ORIGINS: http://localhost:81
      MINISTACK_ENDPOINT: http://ministack:4566
      MINISTACK_ACCESS_KEY: test
      MINISTACK_SECRET_KEY: test
      MINISTACK_REGION: us-east-1
    depends_on:
      db:
        condition: service_healthy
      ministack:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "81:80"
    depends_on:
      - backend

volumes:
  db_data:
  ministack_data:
  ministack_tmp:
