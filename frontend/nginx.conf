server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Aset ber-hash (nama file berubah tiap build) → boleh di-cache permanen.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html JANGAN di-cache: selalu ambil terbaru agar reload biasa
    # langsung memuat bundle terbaru (tak perlu hard refresh setelah deploy).
    # 'no-store' juga menonaktifkan bfcache → tombol Back memuat ulang segar.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
